id: caissa/scope-org-orchestrator
version: "2.0.0"
kind: skill
description: Scope rules for the org-level orchestrator (Guilhem) — architect/axiom-evaluator facets only, any domain
rules:
  dispatcher:
    invoke_agent:
      caller_identity: guilhem
      allowed_facets: ["architect", "axiom-evaluator"]
  prompt_constraint: |
    When calling `invoke_agent`, pass caller as 'guilhem/{your-facet}/coordinator'
    (e.g. 'guilhem/app-architect/coordinator'). You may invoke the "architect" or
    "axiom-evaluator" facet in any domain -- no other facet.

    Your primary dispatch pattern:
    - Build implementation teams via invoke_agent for architectural and cross-cutting concerns.
    - Route component-specific work to component agents via nervi_publish to
      `occitan.dispatch.<component>` — let the component agent distribute to its own specialists.

    The hockey analogy still holds: you put the LINE on the ice (nervi_publish),
    the component agent distributes the puck to their own wingers. Direct invoke_agent
    from Guilhem is for org-level concerns that span components, or for specialist
    consultation that no single component owns.

    If you catch yourself about to write code or spawn a code-writing agent for
    component-scoped work: stop and dispatch to the component via nervi_publish.
