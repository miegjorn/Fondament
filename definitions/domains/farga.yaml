id: domain/farga
version: "1.1.0"
kind: domain
repo: Farga
default_facet: architect
context: |
  Farga is the memory substrate of the Occitan stack.

  In Occitan, "farga" is a forge — the place where raw material is worked into
  something with shape and purpose. Farga takes raw experience (signals, decisions,
  observations) and forges it into structured context that future agents can use.

  ## What Farga is

  Farga is a REST HTTP service (port 7500) backed by SQLite. It holds the persistent
  state that makes agent statelessness possible. Without Farga, every agent session
  starts cold. With Farga, agents resume from a rich picture of what the project is,
  what has been decided, and what is in flight.

  ## Core entities

  - **Projects** — namespaces for context. occitan, farga, guilhem are all projects.
  - **Signals** — observations written by agents. Timestamped, tagged, searchable.
    A chronicle run writes signals. A design session writes signals.
  - **Artifacts** — structured outputs: design documents, decisions, test results.
  - **References** — pointers to authoritative *external* live sources (Confluence
    pages, RSS feeds, API endpoints, websockets). The content is never copied into
    Farga; it is fetched just-in-time at agent runtime. Added in Farga `8c1c992d`.
  - **Disciplines** — org-internal procedures, checklists, and BPA/RPA workflows an
    agent must follow (deployment checklists, approval flows, compliance steps).
    Org-specific and non-portable — unlike a skill, a discipline only makes sense
    inside this organization. Added in Farga `8c1c992d`.
  - **Context** — the assembled markdown representation of a project's state,
    returned by GET /context/project/{id}. This is what goes into /workspace/CLAUDE.md
    at spawn time.

  ## MCP tools (primary interface for agents)

  Farga exposes an MCP server at `POST /mcp`. All agents interact with Farga through
  these tools — do not make raw HTTP calls when a tool exists.

  | Tool | Description |
  |------|-------------|
  | `write_signal` | Write an observation, event, or decision to project memory |
  | `read_context` | Read the current assembled context for a project as markdown |
  | `write_artifact` | Store a durable structured output (design doc, ADR, decision) |
  | `search_signals` | Retrieve recent signals for a project, optionally filtered by time |
  | `list_projects` | List all known projects in Farga |
  | `update_component_todo` | Create or overwrite the TODO record for a (project, component) pair |
  | `write_reference` | Register an external live source (Confluence, RSS, API, websocket) as a `reference` node; JIT-resolved at runtime, never copied into Farga |
  | `resolve_reference` | JIT-fetch the current content of a registered reference, applying its transform hint; always returns live source state |
  | `write_discipline` | Store an org-internal procedure, checklist, or BPA/RPA workflow as a `discipline` node; org-specific and non-portable |
  | `get_discipline` | Retrieve a discipline for an agent to follow — this org's specific steps for a task, not general methodology |

  Artifact kinds: `adr`, `design`, `test-plan`, `implementation-notes`, `decision`.

  ## Node kinds: Reference and Discipline (Farga `8c1c992d`)

  Beyond signals and artifacts, Farga persists two node kinds for knowledge that
  lives *outside* Farga or *outside* the codebase. Both are resolved at agent
  runtime, not baked into a project's context document.

  ### `reference` — external live sources (JIT-resolved)

  A reference registers an authoritative external source so agents can pull its
  *current* state on demand. The content is never copied into Farga: the source
  stays the single source of truth, and each `resolve_reference` call fetches it
  live and applies the reference's transform hint before returning it to the agent.

  Write with `write_reference`:

  | Field | Required | Meaning |
  |-------|----------|---------|
  | `path` | yes | Stable identifier, e.g. `[occitan][architecture/confluence-adr]` |
  | `url` | yes | The authoritative URL or endpoint |
  | `fetch_type` | yes | How to fetch: `http_get` \| `rss` \| `websocket` \| `api` |
  | `project` | yes | Owning project |
  | `title` | no | Human-readable name |
  | `transform_hint` | no | How to distill raw content for agents (e.g. `extract h2 sections`, `summarize`, `return as-is`) |

  Read with `resolve_reference(path)` — fetches live, applies the transform hint,
  returns agent-digestible content. Because it always hits the source, a reference
  never goes stale the way a copied snapshot would.

  **When to use a reference vs a signal:** write a signal to record an observation
  or decision that Farga should *own and remember*. Register a reference when the
  authoritative content lives in another system that will keep changing (a
  Confluence design page, a status feed, a live API) and you want agents to read
  its current state rather than a point-in-time copy.

  ### `discipline` — org-internal procedures

  A discipline stores an org-specific way of doing something: a deployment
  checklist, an approval workflow, a compliance procedure, a BPA/RPA flow
  definition. Disciplines are *not portable* — unlike a skill (general
  methodology that applies anywhere), a discipline encodes *this* organization's
  specific steps and only makes sense here. They are resolved at agent runtime.

  Write with `write_discipline`:

  | Field | Required | Meaning |
  |-------|----------|---------|
  | `path` | yes | Stable identifier, e.g. `[nervi][deploy-checklist]` or `[occitan][incident-response]` |
  | `content` | yes | The procedure — markdown, steps, checklist, or BPA/RPA flow definition |
  | `project` | yes | Owning project |
  | `title` | no | Human-readable name |
  | `component` | no | Component this discipline belongs to; omit for org-wide disciplines |

  Read with `get_discipline(path)` — returns the full procedure content. Call it
  when an agent needs the concrete internal steps for a task.

  **When to use `write_discipline` vs `get_discipline`:** `write_discipline`
  records or updates a procedure (authoring side); `get_discipline` retrieves it
  for an agent about to perform the task (consumer side). Reach for a discipline
  rather than a skill whenever the "how" is specific to this org and would be wrong
  advice anywhere else.

  ## REST interface (infrastructure / external callers)

  - `GET /health` — liveness check
  - `GET /context/project/{id}` — full markdown context for a project
  - `POST /signals` — write a signal (prefer MCP tool)
  - `GET /signals?project={id}&since=<ISO8601>` — list signals
  - `POST /artifacts` — write an artifact (prefer MCP tool)
  - `GET /artifacts/{id}` — retrieve an artifact

  ## Design constraints

  - SQLite single-writer: Farga uses a Recreate deployment strategy in k8s.
    Do not add Postgres unless there is a clear operational need — the simplicity
    of SQLite is intentional.
  - Farga is the ONLY place agents persist state. There is no other database for
    agent memory. Postgres in the stack is only for Synapse (Matrix homeserver).
  - Farga's docs directory contains seed knowledge baked into the image and copied
    to the PVC on first run. This is the "blank slate" project context.

  ## What Farga is NOT

  - Not a general purpose database. It stores context, not business data.
  - Not a message queue. Signals are observations, not events to be consumed.
  - Not a cache. Context in Farga is the truth, not a projection of something else.

  ## Dependencies

  - None at runtime. Farga is a leaf node — no upstream services.
  - Consumed by: Guilhem (chronicle writes), all component agents (context reads),
    Caissa (workspace seeding at spawn time).
