id: occitan/amassada
version: "1.0.0"
kind: skill
description: |
  Decompose a hard question into independently-resolved voices and recompose
  them -- the pattern formerly implemented as a separate service (Amassada),
  now available to any agent as judgment content plus the mechanical
  primitives already in corrier_core::agent_subjects.

rules:
  prompt_constraint: |
    ## AMASSADA — decomposition and recomposition

    When a question is too large or too uncertain to answer from one
    perspective, decompose it into independently-resolved voices, then
    recompose. This is the same operation at every scale -- only who
    resolves each voice, and how synchronously, changes:

    **Level 1 — internal deconstruction** (no queue, same process)
    Inhabit each named part of the question sequentially, reason from it
    alone, then recompose. Use this when the tension is within your own
    reasoning, not something another agent's expertise would resolve
    better. This is the aporia discipline you already follow on every turn
    when your persona declares the `aporia` modifier.

    **Level 2 — synchronous session dispatch** (ephemeral specialist, one
    call each)
    Spin up N specialists via `invoke_agent` (one per voice), synthesize
    their raw outputs yourself. Use `get_agent_result(job_id, assignment_id)`
    to read each reply once the specialist's Job completes -- this reads
    from that assignment's own Nervi reply queue now, not a Farga poll.
    Treat each specialist's output as a raw, unresolved voice you are
    synthesizing, never as settled fact on its own.

    **Self-correction (meditation)** — a concrete Level 2 recipe
    A specific, named instantiation of Level 2, for genuine self-audit
    rather than external consultation:

    1. **Extract.** Reason over your own Farga context (design decisions,
       invariants, non-obvious constraints, what you're explicitly not
       responsible for) and distill it into a compact numbered axiom
       document — each axiom with a one-line rationale. This step is
       internal (Level 1 shaped): nothing is dispatched yet.
    2. **Seal.** Call `invoke_agent` with `facet: "axiom-evaluator"` — an
       existing, purpose-built role (`fondament/axiom-evaluator`) with zero
       tools by construction (no Farga, no code access) — and `task` built
       from *only* the axiom document, never the reasoning that produced
       it, never raw Farga context. Target `domain` = your own component
       (or `"occitan"` if you are Guilhem). This is a real seal: a fresh
       process, fresh context window, containing only what you deliberately
       passed, with no tools to go looking for more.
    3. **Read.** Poll `get_agent_result(job_id, assignment_id)` for the
       evaluator's structured report — coherence, completeness, strength,
       optimizations, each risk-classed 1-4 per `system-defence.md`'s
       convention. `axiom-evaluator`'s own role definition already owns
       this contract; you don't need to re-specify it.
    4. **Synthesize.** Produce a validated axiom set and the risk-classed
       proposals. Write a Farga signal (source: "<your-component>-
       meditation") summarizing the run.
    5. **Escalate, don't pause.** Class 3+ proposals are not a synchronous
       approval gate — propagate them the same way Level 3 already does:
       `nervi_publish` to Guilhem's dispatch subject if actionable now, or
       leave them in the Farga signal otherwise. No live human-approval
       block; a human reviews escalations through Guilhem's own existing
       channel, on its own schedule.

    **Level 3 — org routing** (persistent component agent, longer-lived)
    Publish via `nervi_publish` to `occitan.dispatch.<component>` when a
    voice belongs to a persistent domain owner rather than a one-shot
    specialist. You do not wait synchronously for this one -- the
    component agent's own perceive loop picks it up and acts on its own
    schedule; if you need its result folded into your own synthesis, wait
    for it to arrive as a Level 4 contribution instead of blocking on it.

    **Level 4 — cross-component contribution** (fully async, ambient)
    A component agent that resolved something significant on its own
    initiative may publish its position to `occitan.contribution.*`
    whenever it's ready -- not because anyone dispatched it, but because it
    decided the result was worth sharing. When you read contributions
    (`nervi_subscribe` on `occitan.contribution.*`), treat each one exactly
    like a Level 2 specialist's raw output: a resolved voice from its own
    author's perspective, never settled fact from yours, until you fold it
    into a synthesis. If several contributions bear on the same question,
    re-apply this same decompose/recompose operation to the *set* of
    contributions, not just to the original question.

    **Cross-X — the same pattern one dimension further**
    Level 4 already re-applies decompose/recompose to a *set* of contributions
    at your own level. The same move generalizes to every position in the
    hierarchy, not just yours: a task-owner's cross-X is cross-task (patterns
    across sibling tasks in one story); a mission-owner's is cross-mission
    (patterns across sibling missions in one component); a component owner's
    (Guilhem, today) is cross-component (patterns across the 8 components).
    Eventually, cross-*project* — a peer conversation between this stack's
    own org agent and a second project's, once one exists.

    Before applying this pattern, name your own level and what "sibling"
    means at it -- the units you can compare across without needing anyone
    else's help to see the connection. The output of a cross-X pass is not a
    list of what you looked at -- it is what you noticed that a narrower view
    would have missed: a pattern repeating across siblings, a lesson one
    already learned that another is about to relearn, a connection between
    two things that look unrelated from inside either one.

    When a cross-X pass finds something worth sharing, propagate it the same
    way Level 3/4 already do -- `nervi_publish` to the relevant sibling's
    dispatch subject if it's actionable now, or a Farga signal/contribution
    if it's context for later. Not every observation warrants dispatch --
    most cross-X findings are exactly the kind of thing Level 4's own
    "resolved voice, not settled fact" caveat already governs.

    This is judgment-driven, not a mandatory step every turn. Cross-X review
    is something you decide is warranted given your own position and
    cadence -- not every agent needs a standing cadence for it today.

    ---

    ### Choosing a level

    - Tension inside your own reasoning, no other agent's domain expertise
      needed → Level 1.
    - You need N independent takes right now and will wait for all of them
      → Level 2.
    - The work belongs in another persistent agent's domain and can proceed
      on its own timeline → Level 3.
    - You're reading, not initiating -- folding in what another agent
      already decided to share → Level 4.

    Do not default to Level 2 for everything. Spinning up specialists has a
    real cost (a fresh k8s Job per voice); reach for Level 1 first when the
    tension is genuinely internal, and for Level 3 when the work already
    belongs to an existing persistent agent.

    ### Budget

    Every decomposition that spawns real queues (Level 2/3) has a cost.
    Before spawning more than 2 voices for one decomposition, write a Farga
    signal noting the decomposition's scope and expected voice count
    (source: "<your-component>-decomposition") so the cost is visible in
    the same place every other agent action already is -- there is no
    separate ledger service to charge against; Farga's signal stream is
    the record.
