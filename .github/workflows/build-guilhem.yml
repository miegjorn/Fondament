name: Build & push guilhem

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'definitions/**'
      - 'fondament-core/src/**'
      - 'Dockerfile'
      - '.github/workflows/build-guilhem.yml'
  pull_request:
    branches: [main]
    paths:
      - 'definitions/**'
      - 'fondament-core/src/**'
      - 'Dockerfile'
      - '.github/workflows/build-guilhem.yml'

permissions:
  contents: read
  packages: write

jobs:
  lint-projects:
    # Lightweight, self-contained gate for project-agent compositions (F-2).
    # Does not build the Rust toolchain and needs no secrets, so it runs on every
    # PR — including forks — independently of the heavier build job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Fondament repo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run project-agent lint tests
        run: python -m unittest scripts/test_lint_project_agents.py -v
      - name: Lint project-agent compositions
        run: python scripts/lint_project_agents.py

  fondament-lint:
    # F-3: validates Intake Agent YAML output against the canonical format
    # (docs/intake-output-format.md). Like lint-projects, it is dependency-light
    # (PyYAML only), needs no Rust toolchain and no secrets, so it gates every PR
    # including forks. The intake-architect's drafts must pass this before review.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Fondament repo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run intake-output lint tests
        run: python -m unittest scripts/test_lint_intake_output.py -v
      - name: Lint valid intake example (must pass)
        run: python scripts/lint_intake_output.py examples/intake/nervi
      - name: Lint malformed intake example (must fail with clear messages)
        # The malformed fixture must make the lint exit non-zero. We invert the
        # exit code so the *job* stays green while proving the red path works and
        # surfacing the field-level error messages in the build log.
        run: |
          if python scripts/lint_intake_output.py examples/intake-invalid; then
            echo "::error::lint passed on the malformed fixture — it must fail"
            exit 1
          fi
          echo "malformed fixture correctly rejected"

  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Fondament repo

      # Pull the published caissa binary so we don't rebuild Rust from scratch here.
      # Depends on occitan/Caissa CI having pushed ghcr.io/miegjorn/caissa:latest first.
      # GITHUB_TOKEN is repo-scoped and can't read a package published by the Caissa
      # repo; MIEGJORN_CI_TOKEN is the org-scoped PAT already used by update-caissa.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MIEGJORN_CI_TOKEN }}

      - name: Extract caissa binary
        run: |
          docker pull ghcr.io/miegjorn/caissa:latest
          id=$(docker create ghcr.io/miegjorn/caissa:latest)
          docker cp "$id":/usr/local/bin/caissa /usr/local/bin/caissa
          docker rm "$id"
          caissa --help

      - name: Write minimal caissa.toml for build command
        run: |
          cat > caissa.toml <<'EOF'
          [caissa]
          farga_url = "http://localhost:7500"
          project = "occitan"
          fondament_path = "."
          pii_patterns = ["email", "phone"]
          workspaces_dir = "workspaces"
          EOF

      - name: Build guilhem image
        run: caissa build guilhem --fondament-path .

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          docker tag caissa-sandbox:guilhem "ghcr.io/miegjorn/caissa-sandbox:guilhem"
          docker tag caissa-sandbox:guilhem "ghcr.io/miegjorn/caissa-sandbox:guilhem-sha-${SHORT_SHA}"
          docker push "ghcr.io/miegjorn/caissa-sandbox:guilhem"
          docker push "ghcr.io/miegjorn/caissa-sandbox:guilhem-sha-${SHORT_SHA}"

  update-caissa:

    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: miegjorn/Caissa
          token: ${{ secrets.MIEGJORN_CI_TOKEN }}
          ref: main
      - uses: mikefarah/yq@v4
      - name: Bump guilhem image tag
        run: |
          export TAG="guilhem-sha-${GITHUB_SHA:0:7}"
          yq -i '.image = "ghcr.io/miegjorn/caissa-sandbox:" + env(TAG)' deploy/charts/guilhem/values.yaml
          git config user.email "ci@miegjorn.dev"
          git config user.name "Occitan CI"
          git add deploy/charts/guilhem/values.yaml
          git diff --staged --quiet && echo "no-op" || \
            git commit -m "chore(guilhem): deploy guilhem-sha-${GITHUB_SHA:0:7}" && git push
