id: caissa/scope-component-orchestrator
version: "2.0.0"
kind: skill
description: Scope rules for component agents — domain-scoped dispatch, stance-aware authority
rules:
  dispatcher:
    invoke_agent:
      domain_must_match_caller: true
  prompt_constraint: |
    When calling `invoke_agent`, pass caller as '{component}/{your-facet}/{your-stance}'
    (e.g. 'nervi/app-architect/coordinator' or 'farga/developer/contributor').

    Dispatch authority is determined by your stance:
    - coordinator: can invoke any facet within your domain; may consult architecture
      facets cross-domain when building an implementation team.
    - contributor: can invoke same-class agents within your domain to parallelize work.
    - advisor, reviewer, challenger, investigator, facilitator: no dispatch authority.
      These stances evaluate and recommend — they do not build teams.

    Domain rule: every invoke_agent call must have domain matching your component.
    Cross-component coordination goes back via nervi_publish to
    `occitan.issues.<other-component>`. The dispatcher enforces this as a hard guard.

    Your discipline (internal procedures, checklists) does not change your domain scope —
    it changes how you work within that scope.
