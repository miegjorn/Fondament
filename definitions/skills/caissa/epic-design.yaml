id: caissa/epic-design
version: "1.2.0"
kind: skill
description: |
  When a component agent receives an Epic with a design brief: load architect context
  (global architecture + component state from Farga), open a multi-persona planning
  session via Amassada, produce GitHub Stories with TDD-first subtasks and facet labels.
  Signal Nervi on Epic in_progress and on each story created.

rules:
  prompt_constraint: |
    ## EPIC DESIGN — when your component receives an Epic

    Use this process when you receive an Epic from Guilhem's initiative-design flow.
    Your job: decompose the Epic design brief into implementable stories with
    TDD-first subtasks, facet labels, and a Definition of Done that includes
    CI pass and security validation.

    Do not create stories ad-hoc from the Epic body. The planning session exists
    to surface what you haven't thought through yet — use it.

    ---

    ### Step 1 — Signal Epic in_progress

    Before anything else:

    ```bash
    gh issue edit <epic_number> --add-label "in-progress"
    ```

    ```json
    nervi_publish(subject: "occitan.status", qualifier: "info", payload: {
      "type": "status-update",
      "level": "epic",
      "component": "<component>",
      "ticket": <epic_number>,
      "title": "<epic title>",
      "status": "in_progress"
    })
    ```

    ### Step 2 — Load context before opening the session

    The architect persona needs loaded context to drive a useful brainstorm.
    Before opening the Amassada session, fetch and include:

    1. **Global architecture context** — read from Farga:
       ```
       read_context_node(project: "occitan", role: "org")
       ```

    2. **Component current state** — read from Farga:
       ```
       read_context_node(project: "<component>", role: "architect")
       search_signals(project: "<component>")
       ```

    3. **Epic body** — the design section for your component.

    Package these as the `context` field in the Amassada session request.
    The architect will not produce useful design questions without this — they
    are an expert on architecture, not a psychic.

    ### Step 3 — Open a multi-persona planning session via Amassada

    Publish to `occitan.dispatch.amassada` via nervi_publish:

    ```json
    {
      "type": "planning-session",
      "level": "epic",
      "architect": true,
      "skill": "superpowers:brainstorming",
      "planning_group": ["developer", "qa", "devops", "security"],
      "brief": "<Epic design section for your component>",
      "context": "<loaded Farga context>",
      "session_id": "<generate: epic-<component>-<epic_number>-<date>>",
      "initiator": "<component>",
      "epic": <epic_number>,
      "tdd": true
    }
    ```

    Amassada runs a joint session:
    - **Architect** drives `superpowers:brainstorming` to surface what needs to be
      specified before the work can start
    - **Planning group** (developer + qa + devops + security) reviews the emerging
      story list and challenges it from their angles simultaneously — they can and
      should push back on each other:
      - Developer: "that story has no clear implementation boundary"
      - QA: "there is no testable acceptance criterion for this"
      - Devops: "this assumes infrastructure that does not exist"
      - Security: "this exposes a surface that is not in the current threat model"
    - **You** (component agent) are the domain authority — you answer and adjudicate
      when personas conflict

    ### Step 4 — Validate the story list before closing

    Before signalling session completion, confirm each story has:
    - A specific, bounded action (not "improve the thing")
    - Acceptance criteria that a test can verify
    - Facet labels: `developer`, `qa`, `devops`, `security` — at least one
    - A TDD note: what failing tests must exist before implementation starts
    - Dependencies on other stories made explicit
    - A security consideration (even if the answer is "no new surface")

    Stories that cannot meet this bar need to be split or sent back for more design.

    Signal session completion. Amassada writes the story breakdown to Farga:
    - project: `"<component>"`, role: `"design"`, key: `"epic-<epic_number>-stories"`

    ### Step 5 — Create GitHub Stories

    For each story in the breakdown:

    1. Create the GitHub Issue:
       ```bash
       gh issue create \
         --title "[Story] <work item — specific and bounded>" \
         --label "story,<component>,<facet1>,<facet2>" \
         --body "$(cat <<'BODY'
       ## What
       <what must be built or changed>

       ## Why
       <why this story exists in the context of the Epic>

       ## TDD — tests first
       <list of failing tests that must be written before implementation starts>

       ## Acceptance criteria
       <what must be true for this story to be done>

       ## Security consideration
       <attack surface, data sensitivity, or "no new surface introduced">

       ## Dependencies
       <other story numbers that must complete first, or "none">

       ## Definition of Done
       - [ ] Failing tests written and committed before implementation
       - [ ] All tests green in CI
       - [ ] Security scan passes
       - [ ] PR reviewed and merged
       - [ ] Deployed and verified live

       Epic: #<epic_number>
       BODY
       )"
       ```

    2. Sub-link to the Epic (GitHub sub-issues or body reference).

    3. Signal Nervi for each story created:
       ```json
       nervi_publish(subject: "occitan.status", qualifier: "info", payload: {
         "type": "status-update",
         "level": "story",
         "component": "<component>",
         "ticket": <story_number>,
         "title": "<story title>",
         "status": "open",
         "epic": <epic_number>
       })
       ```

    4. After all stories are created, write to Farga:
       ```
       write_signal(project: "<component>", source: "epic-design",
                    content: "Epic #<N> decomposed into <M> stories: #<list>")
       ```

    ---

    ### Required: acceptance test story

    Every Epic must include one mandatory story created by the QA persona:

    ```bash
    gh issue create \
      --title "[Story] Acceptance test suite for Epic #<N>" \
      --label "story,<component>,qa,acceptance" \
      --body "$(cat <<'BODY'
    Implement the acceptance test suite for Epic #<N> as specified by the QA
    persona in the planning session.

    ## Acceptance scenarios to cover
    <list from the planning session — every scenario specified must have a test>

    ## Location
    tests/acceptance/epic-<N>/ in the component repo

    ## CI trigger
    Tests run automatically when the Epic issue is closed (GitHub Actions on
    issues: [closed] + label: epic). All tests must be automatable — no manual steps.

    ## Definition of Done
    - [ ] All acceptance scenarios have automated tests
    - [ ] Tests are tagged for this Epic and discoverable by CI
    - [ ] Tests pass on the current main branch
    - [ ] CI job confirmed to trigger correctly on issue close

    Epic: #<epic_number>
    BODY
    )"
    ```

    This story is not optional. An Epic without an acceptance test suite cannot
    be considered delivered — it has no integration gate.

    ---

    ### What this skill does NOT cover

    - Spawning the execution group (that is caissa/story-execution)
    - Running the acceptance tests (that is caissa/epic-acceptance, triggered by CI)
    - Implementing anything
    - Reviewing code

    This skill ends when the stories exist, are linked to the Epic, and Nervi
    has been signalled. The component agent's normal Nervi polling loop picks up
    each story and runs caissa/story-execution when ready.
