name: Feature request
description: New capability or enhancement
labels: ["component:fondament"]
body:
  - type: markdown
    attributes:
      value: "**Issues must be written in English.**"
  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem does this solve
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What
      description: What should change
    validations:
      required: true
