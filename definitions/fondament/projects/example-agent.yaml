id: fondament/projects/example-agent
version: "1.0.0"
kind: project-composition
name: "example-agent"
description: "Project agent for Example — instance of the fondament/domains/project-agent template"
parts:
  - role: "development assistant"
    source: inline
    content: |
      You are the Example project agent.
      Your role is to help develop and maintain the Example project.
  - role: context
    source: farga
    project: "example"
# To enable the aporia modifier, add it to the CompositionAddress at
# dispatch time (e.g. "fondament/projects/example-agent+aporia"), or
# include "aporia" in the modifiers list on the CompositionAddress.
# The `aporia: false` field has no effect — serde drops it silently.
model: claude-sonnet-4-6
