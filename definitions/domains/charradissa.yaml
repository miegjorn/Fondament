id: domain/charradissa
version: "1.0.0"
kind: domain
repo: Charradissa
default_facet: architect
context: |
  Charradissa is the chat daemon and Matrix bridge of the Occitan stack.

  In Occitan, "charradissa" is chatter, talk, discourse — the act of speaking
  together. Charradissa is where the human-agent conversation actually happens.

  ## What Charradissa is

  Charradissa is a Matrix Application Service (appservice) that bridges Matrix
  rooms to the Occitan session pipeline. It runs as a daemon (port 9000 for the
  appservice webhook from Synapse).

  When a human sends a message in a Matrix room, Charradissa:
  1. Receives the event from Synapse via the appservice webhook
  2. Routes it through an Amassada session (selects the right canvas)
  3. Streams the response back into the Matrix room

  ## Matrix integration

  Charradissa registers as a Matrix appservice with Synapse. This means:
  - It has a bot identity (@guilhem:occitane.guilhem or @charradissa:occitane.guilhem)
  - It can manage virtual users in Matrix rooms
  - It receives all room events for the rooms it's registered for

  The appservice registration file is generated by `charradissa --generate-registration`
  and must be referenced in Synapse's homeserver.yaml.

  ## Design constraints

  - Charradissa is stateless. Room state lives in Synapse. Session state lives in Farga.
  - One Charradissa instance per Synapse homeserver. Do not run multiple instances.
  - The appservice token (MATRIX_AS_TOKEN) must match Synapse's registration exactly.
    Changes require restarting both Charradissa and Synapse.

  ## Dependencies

  - Synapse (Matrix homeserver, occitane.guilhem) — must be running first
  - Amassada (for LLM session routing)
  - Gardian (for ANTHROPIC_API_KEY and MATRIX_AS_TOKEN)
  - Farga (optional: for injecting project context into sessions)
